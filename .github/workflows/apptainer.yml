name: Apptainer Run

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
  pull_request:
    branches-ignore: []
  schedule:
    - cron: '0 0 1 * *'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5
      matrix:
        python: ['3.11']
      fail-fast: false

    steps:

    # Clean up unnecessary preinstalled packages to free disk space
    - name: Pre-cleanup
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"

    # Cache Apptainer image cache (~/.apptainer/cache)
    - name: Cache Apptainer images
      uses: actions/cache@v4
      with:
        path: ~/.apptainer/cache
        key: ${{ runner.os }}-apptainer-images-v1

    # Install Apptainer from GitHub releases (avoids flaky Launchpad PPA)
    - name: Install Apptainer
      run: |
        APPTAINER_VERSION=$(curl -s https://api.github.com/repos/apptainer/apptainer/releases/latest \
          | grep '"tag_name"' | cut -d'"' -f4 | sed 's/v//')
        wget -q "https://github.com/apptainer/apptainer/releases/download/v${APPTAINER_VERSION}/apptainer_${APPTAINER_VERSION}_amd64.deb"
        sudo apt-get install -y "./apptainer_${APPTAINER_VERSION}_amd64.deb"
        apptainer --version

    # Checkout repository
    - name: Checkout repo
      uses: actions/checkout@v4

    # Set up Python
    - name: Set up Python ${{ matrix.python }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python }}

    # Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[testing]

    # Install package and pinned dependency
    - name: Install package itself
      run: |
        pip install .
        pip install "pulp>=2.8" --no-deps

    # Run tests using Apptainer
    - name: Run Apptainer tests
      run: |
        sequana_mapper --input-directory test/data/ \
          --reference-file test/data/measles.fa \
          --use-apptainer --apptainer-prefix ~/.apptainer/cache

        cd mapper && bash mapper.sh
