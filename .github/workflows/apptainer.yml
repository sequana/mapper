name: Apptainer Run

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
  pull_request:
    branches-ignore: []
  schedule:
    - cron: '0 0 1 * *'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5
      matrix:
        python: ['3.11']
      fail-fast: false

    steps:

    # Clean up unnecessary preinstalled packages to free disk space
    - name: Pre-cleanup
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"

    # Install Apptainer from Ubuntu's default repos (no PPA, avoids flaky network timeouts)
    - name: Install Apptainer
      run: |
        sudo apt-get update
        sudo apt-get install -y apptainer
        apptainer --version

    # Cache Apptainer image cache (~/.apptainer/cache)
    - name: Cache Apptainer images
      uses: actions/cache@v4
      with:
        path: ~/.apptainer/cache
        key: ${{ runner.os }}-apptainer-images-v1

    # Checkout repository
    - name: Checkout repo
      uses: actions/checkout@v4

    # Set up Python
    - name: Set up Python ${{ matrix.python }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python }}

    # Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[testing]

    # Install package and pinned dependency
    - name: Install package itself
      run: |
        pip install .
        pip install "pulp>=2.8" --no-deps

    # Run tests using Apptainer
    - name: Run Apptainer tests
      run: |
        sequana_mapper --input-directory test/data/ \
          --reference-file test/data/measles.fa \
          --use-apptainer --apptainer-prefix ~/.apptainer/cache

        cd mapper && bash mapper.sh
